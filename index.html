<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuestionario — Lenguaje y Memoria</title>
<style>
:root{--bg:#0f1117;--surface:#1a1d2e;--surface2:#222539;--border:#2e3150;--accent:#6c63ff;--accent2:#a78bfa;--text:#e2e8f0;--muted:#8892b0;--correct:#22c55e;--correct-bg:rgba(34,197,94,.12);--wrong:#ef4444;--wrong-bg:rgba(239,68,68,.12);--warning:#f59e0b;--radius:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 60px}
h1{font-size:clamp(1.2rem,4vw,1.7rem);font-weight:700;text-align:center;margin-bottom:4px;background:linear-gradient(135deg,#a78bfa,#6c63ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:var(--muted);font-size:.85rem;text-align:center;margin-bottom:24px}
.top-controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:20px;width:100%;max-width:780px}
.toggle-wrap{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:6px 14px;cursor:pointer;user-select:none;font-size:.85rem;color:var(--muted);transition:border-color .2s}
.toggle-wrap:hover{border-color:var(--accent)}
.toggle-wrap input{display:none}
.toggle-slider{width:36px;height:20px;background:var(--border);border-radius:50px;position:relative;transition:background .2s;flex-shrink:0}
.toggle-slider::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;background:#fff;border-radius:50%;transition:left .2s}
input:checked+.toggle-slider{background:var(--accent)}
input:checked+.toggle-slider::after{left:19px}
.btn-review{background:linear-gradient(135deg,#f59e0b,#d97706);color:#fff;border:none;border-radius:50px;padding:7px 18px;font-size:.85rem;font-weight:600;cursor:pointer;transition:opacity .2s}
.btn-review:hover{opacity:.85}
.btn-review:disabled{opacity:.4;cursor:default}
.stats-bar{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:20px;width:100%;max-width:780px}
.stat-pill{background:var(--surface);border:1px solid var(--border);border-radius:50px;padding:5px 14px;font-size:.8rem;display:flex;align-items:center;gap:6px}
.stat-pill .dot{width:8px;height:8px;border-radius:50%}
.dot-green{background:var(--correct)}.dot-red{background:var(--wrong)}.dot-blue{background:var(--accent)}
.progress-wrap{width:100%;max-width:780px;margin-bottom:20px}
.progress-label{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:6px}
.progress-bar-bg{width:100%;height:6px;background:var(--surface2);border-radius:50px;overflow:hidden}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#6c63ff,#a78bfa);border-radius:50px;transition:width .4s ease}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:28px 28px 24px;width:100%;max-width:780px;margin-bottom:20px}
.q-meta{font-size:.73rem;color:var(--muted);margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-block;padding:2px 8px;border-radius:50px;font-size:.7rem;font-weight:600;border:1px solid}
.badge-high{color:var(--correct);border-color:var(--correct)}.badge-med{color:var(--warning);border-color:var(--warning)}.badge-low{color:var(--wrong);border-color:var(--wrong)}
.badge-review{color:var(--warning);border-color:var(--warning);background:rgba(245,158,11,.1)}
.q-text{font-size:1.05rem;line-height:1.6;font-weight:500;margin-bottom:20px}
.options{display:flex;flex-direction:column;gap:10px}
.option{display:flex;align-items:flex-start;gap:12px;background:var(--surface2);border:2px solid var(--border);border-radius:10px;padding:13px 16px;cursor:pointer;transition:border-color .15s,background .15s;font-size:.95rem;line-height:1.45}
.option:hover:not(.locked){border-color:var(--accent);background:rgba(108,99,255,.08)}
.option.selected{border-color:var(--accent);background:rgba(108,99,255,.12)}
.option.correct-ans{border-color:var(--correct)!important;background:var(--correct-bg)!important}
.option.wrong-ans{border-color:var(--wrong)!important;background:var(--wrong-bg)!important}
.opt-letter{flex-shrink:0;width:28px;height:28px;border-radius:50%;background:var(--border);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;transition:background .15s}
.option.selected .opt-letter{background:var(--accent);color:#fff}
.option.correct-ans .opt-letter{background:var(--correct);color:#fff}
.option.wrong-ans .opt-letter{background:var(--wrong);color:#fff}
.opt-icon{margin-left:auto;flex-shrink:0;font-size:1.1rem}
.feedback{margin-top:18px;border-radius:10px;padding:14px 16px;display:none;border-left:4px solid;font-size:.88rem;line-height:1.55}
.feedback.show{display:block}
.feedback.correct{border-color:var(--correct);background:var(--correct-bg);color:#86efac}
.feedback.incorrect{border-color:var(--wrong);background:var(--wrong-bg);color:#fca5a5}
.feedback-header{font-weight:700;font-size:.95rem;margin-bottom:6px}
.feedback-explanation{color:var(--text);font-style:italic}
.nav-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;width:100%;max-width:780px}
.btn{border:none;border-radius:50px;padding:10px 24px;font-size:.9rem;font-weight:600;cursor:pointer;transition:opacity .2s,transform .1s}
.btn:active{transform:scale(.97)}.btn:disabled{opacity:.35;cursor:default}
.btn-primary{background:linear-gradient(135deg,#6c63ff,#a78bfa);color:#fff}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.btn-check{background:linear-gradient(135deg,#6c63ff,#818cf8);color:#fff;padding:10px 28px}
.btn-check:disabled{background:var(--surface2);color:var(--muted);border:1px solid var(--border)}
.final-screen{display:none;flex-direction:column;align-items:center;text-align:center;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:40px 28px;width:100%;max-width:780px}
.final-screen.show{display:flex}
.final-emoji{font-size:3.5rem;margin-bottom:16px}
.final-title{font-size:1.5rem;font-weight:700;margin-bottom:8px}
.final-score{font-size:3rem;font-weight:800;background:linear-gradient(135deg,#a78bfa,#6c63ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:6px}
.final-detail{color:var(--muted);font-size:.9rem;margin-bottom:28px}
.final-stats{display:flex;gap:20px;flex-wrap:wrap;justify-content:center;margin-bottom:28px}
.final-stat{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 22px;min-width:120px}
.final-stat .val{font-size:2rem;font-weight:700}.final-stat .lbl{font-size:.75rem;color:var(--muted);margin-top:2px}
.final-stat.green .val{color:var(--correct)}.final-stat.red .val{color:var(--wrong)}
.quiz-wrap{width:100%;display:flex;flex-direction:column;align-items:center}
@media(max-width:520px){.card{padding:20px 16px 18px}.q-text{font-size:.95rem}.option{font-size:.88rem;padding:11px 12px}}
</style>
</head>
<body>

<p class="subtitle">Parcial · 24 preguntas · Apuntes y diapositivas de la profesora</p>
<div class="top-controls">
  <label class="toggle-wrap"><input type="checkbox" id="toggleRandom"><span class="toggle-slider"></span>🔀 Modo aleatorio</label>

    <div class="final-stat red"><div class="val" id="fWrong">0</div><div class="lbl">Incorrectas</div></div>

  </div>

    <button class="btn btn-primary" id="btnFinalRestart">🔄 Volver a empezar</button>
    <button class="btn btn-review" id="btnFinalReview" disabled>⚠️ Repasar errores</button>
  </div>
</div>
<script>
const Q=[{id:1,text:"La generación de candidatos en función de la forma y la estructura métrica se realiza durante:",options:["El acceso al léxico","La selección léxica","El procesamiento post-léxico"],correct:0,confidence:"Alto",explanation:"El acceso al léxico fija las características que permiten determinar si un estímulo es una palabra. Se basa en analizar la forma y estructura métrica (fonología y ortografía). La selección léxica (B) elige el candidato ganador; el post-léxico (C) integra en contexto."},
{id:2,text:"Los datos provenientes de estudios con fMRI sobre los efectos de concreción apoyan:",options:["Modelo de Representación Semántica Contextual","El modelo de disponibilidad contextual","La teoría de codificación dual"],correct:1,confidence:"Alto",explanation:"El estudio fMRI de Fiebach y Friederici concluye con el Modelo de Disponibilidad Conceptual, que establece que las palabras abstractas requieren mayor esfuerzo para representar el concepto. La teoría de codificación dual (C) fue el punto de partida, no la conclusión apoyada."},
{id:3,text:"Cuando existe congruencia entre contenido y sonido afectivo se incrementa la conectividad entre la amígdala y:",options:["El giro temporal superior","El giro fusiforme","La corteza frontal ventro-medial"],correct:0,confidence:"Alto",explanation:"El estudio fMRI sobre fonosimbolismo muestra conectividad entre la amígdala, el giro temporal superior (procesamiento sensorial) y el giro frontal inferior (procesamiento semántico) cuando hay congruencia afectiva entre contenido y sonido."},
{id:4,text:"Durante los procesos de resolución de ambigüedades, el significado más frecuente de una palabra ambigua activa regiones cerebrales:",options:["Anteriores","Medias","Posteriores"],correct:2,confidence:"Alto",explanation:"El estudio de Zempleni y cols. muestra que el significado dominante activa regiones sensoriales posteriores (acceso automático). El significado no dominante, que requiere reinterpretación contextual, activa regiones anteriores de alto nivel."},
{id:5,text:"Los efectos de la emoción sobre el procesamiento de la frecuencia de uso se dan en palabras:",options:["Negativas","Positivas","Neutras"],correct:0,confidence:"Alto",explanation:"Es específicamente la emoción NEGATIVA la que anula los efectos de frecuencia de uso. Este efecto ocurre a los 150 ms, en la etapa léxica temprana."},
{id:6,text:"Según un estudio de fMRI de Kim et al. (1997), en una tarea de producción silenciosa de lenguaje los bilingües TARDÍOS:",options:["Presentan un solapamiento completo para sus dos idiomas en el giro inferior frontal (Broca).","Presentan centros de masa ligeramente distanciados dentro del giro inferior frontal (Broca) para el primer y el segundo idioma.","Presentan un patrón de activación en el giro inferior frontal similar al de los bilingües TEMPRANOS."],correct:1,confidence:"Alto",explanation:"En bilingües tardíos (AoA media 19 años), las áreas de L1 y L2 en el giro inferior frontal están separadas ~7,9 mm (rango 4,5–9 mm). El solapamiento completo (A) corresponde a tempranos (1,1–2,8 mm). La opción C es errónea porque los patrones son opuestos."},
{id:7,text:"Según un estudio que combina las técnicas de MEG y fMRI, el aprendizaje de un segundo idioma (L2):",options:["Implica un menor reclutamiento de áreas cerebrales del hemisferio izquierdo.","Implica un mayor reclutamiento de áreas cerebrales del hemisferio derecho.","Implica un menor reclutamiento de áreas visuales y parietales."],correct:1,confidence:"Alto",explanation:"El estudio de Leonard (2010) con MEG+fMRI demuestra que el aprendizaje de L2 implica el reclutamiento temporal de áreas visuales posteriores y parietales del hemisferio derecho. Este reclutamiento desaparece una vez adquirida la fluidez."},
{id:8,text:"Los bebés recién nacidos, antes de que se produzca el fenómeno de estrechamiento perceptivo dependiente del input:",options:["Sólo son capaces de distinguir los contrastes fonológicos de su lengua materna.","Son capaces de distinguir contrastes fonológicos de cualquier idioma.","Carecen de sensibilidad a los contrastes fonológicos."],correct:1,confidence:"Alto",explanation:"Antes del estrechamiento perceptivo (9–12 meses), los bebés tienen discriminación universal. La opción A describe lo que ocurre DESPUÉS del estrechamiento. La C es incorrecta."},
{id:9,text:"Según un estudio de ERPs, el procesamiento de hechos falsos que contrastan con el conocimiento del mundo (ej. 'El rey Felipe VI está soltero'):",options:["Se realiza en la misma ventana temporal que el procesamiento de una violación semántica.","Se realiza con posterioridad al procesamiento de una violación semántica.","No genera un efecto en N400."],correct:0,confidence:"Alto",explanation:"Hagoort et al. (2004) demuestran que el significado y la veracidad se procesan EN PARALELO: se genera N400 a las mentiras (aunque de menor amplitud). No hay procesamiento secuencial. La opción C es incorrecta porque sí genera N400."},
{id:10,text:"Según los estudios de neuroimagen, ¿existe un periodo crítico para la adquisición de un segundo idioma (L2)?",options:["Sí existe un periodo crítico estricto para todos los aspectos del lenguaje.","No existe un periodo crítico estricto, pero sí una ventana de oportunidad especialmente para aspectos fonéticos.","El periodo crítico afecta principalmente a los aspectos semánticos, no a los fonéticos."],correct:1,confidence:"Alto",explanation:"Conclusión oficial (Slide 52): NO periodo crítico estricto, SÍ ventana de oportunidad para aspectos fonéticos (debido al estrechamiento perceptivo), no tanto para aspectos semánticos o sintácticos."},
{id:11,text:"Los estudios con pacientes amnésicos por encefalitis por herpes simple han descrito que el grado de amnesia retrógrada está relacionado con la extensión de la lesión en:",options:["La corteza frontal","La corteza temporal medial.","La corteza temporal lateral y anterior."],correct:2,confidence:"Bajo",explanation:"Seguridad baja: la encefalitis herpética no aparece explícitamente en los apuntes. La respuesta C se infiere del papel del LTA como hub transmodal/heteromodal principal de la memoria semántica."},
{id:12,text:"En los modelos de memoria a largo plazo activada ¿La información más accesible se encuentra en?",options:["La memoria a largo plazo activada","El bucle fonológico.","El foco atencional."],correct:2,confidence:"Alto",explanation:"El modelo de Cowan tiene dos niveles: MLP activada y dentro de ella el foco atencional, que tiene acceso privilegiado e inmediato. El bucle fonológico (B) es del modelo de Baddeley."},
{id:13,text:"El componente denominado Contralateral Delay Activity (CDA) refleja:",options:["La información presentada al sujeto","La información representada por el sujeto.","La información que el sujeto es capaz de ver una vez."],correct:1,confidence:"Alto",explanation:"La CDA refleja la representación interna activa del sujeto en la MOV, no el input externo. Prueba: alcanza asíntota cuando se supera la capacidad del sujeto aunque se presenten más estímulos."},
{id:14,text:"Los modelos sensoriomotores de MO consideran que la información mantenida se representa en:",options:["El córtex frontal","Regiones sensoriales","El hipocampo."],correct:1,confidence:"Alto",explanation:"La hipótesis sensorial postula que las propias regiones sensoriales representan la información durante el mantenimiento en MO. Confirmado por estudios MVPA. La CPF (A) no codifica información específica."},
{id:15,text:"En el paradigma de la imagen (distribución de recursos), ¿qué condición produciría el peor rendimiento?",options:["Condición A","Condición B","No habría diferencia entre condiciones."],correct:1,confidence:"Alto",explanation:"Condición A tiene señalización: recursos dirigidos a ítem específico, mejor precisión. Condición B sin señalización: recursos divididos, alta variabilidad del error y peor rendimiento."},
{id:16,text:"¿Qué correlato está relacionado con el éxito en la recuperación episódica?",options:["Desincronización de la banda gamma","Desincronización de la banda alfa.","Sincronización de las bandas theta y alpha"],correct:1,confidence:"Alto",explanation:"(1) sube gamma → compleción de patrones en hipocampo; (2) se desincroniza alfa → representación en neocórtex = recolección exitosa. Cuanto más baja alfa, más información se reconstruye."},
{id:17,text:"Según el modelo SPEAR, ¿en qué momento de la fase del ritmo theta el hipocampo está más receptivo a la recuperación de información?",options:["Valle","Pico","Entre el pico y el valle"],correct:1,confidence:"Alto",explanation:"SPEAR: VALLE=codificación (receptivo a la entrada), PICO=recuperación (proclive a la salida). Recuperación → Pico."},
{id:18,text:"¿Qué oscilaciones se acoplan durante el sueño y están relacionadas con la consolidación?",options:["Ondas alfa en el neocórtex, Gamma en el córtex occipital y Theta en el hipocampo.","Spindles en el neocórtex, Alpha en el tálamo y Theta en el hipocampo.","Ondas lentas en el neocórtex, Spindles del tálamo y Ripples del hipocampo."],correct:2,confidence:"Alto",explanation:"Tres oscilaciones jerárquicas: Ripples (hipocampo, 80–140 Hz) anidan en valles de Spindles talámicos (12–15 Hz), que encajan en Ondas lentas neocorticales (0,5–4 Hz). A y B mezclan estructuras incorrectamente."},
{id:19,text:"¿Cuál de los siguientes potenciales evento-relacionados se encuentra sistemáticamente cuando los sujetos emiten juicios de recolección de la memoria episódica?",options:["FN400: negatividad fronto-central a los 400ms.","LPC: positividad parietal-izquierda a los 600ms.","P2: positividad fronto-central a los 200ms."],correct:1,confidence:"Alto",explanation:"FN400 (~400ms, frontal)=familiaridad. LPC (~600ms, parietal izquierdo)=recolección; solo aparece con respuestas de alta confianza. El P2 (C) se asocia al olvido inducido por recuperación (RIF)."},
{id:20,text:"¿Qué región se ha descrito como el núcleo principal de la memoria semántica por su patrón de respuesta heteromodal y su atrofia en casos de demencia semántica?",options:["Lóbulo temporal anterior.","Giro dentado.","Corteza orbitofrontal."],correct:0,confidence:"Alto",explanation:"El LTA es el hub heteromodal: integra representaciones visuales, auditivas y táctiles. La demencia semántica produce atrofia selectiva en LTA. El giro dentado (B) pertenece al hipocampo; la COF (C) no es el hub semántico."},
{id:21,text:"¿Qué componente de los ERPs medido durante la fase de codificación de memoria se asocia con el uso de estrategias elaboradas relacionando diferentes características o unidades conceptuales del estímulo?",options:["Early frontal SME (300-600 ms).","Early parietal SME (350-500 ms).","Late frontal SME (a partir de 550-600 ms)."],correct:2,confidence:"Alto",explanation:"Early frontal (300–600ms)=semántico inicial; Early parietal (350–500ms)=codificación ítem+contexto; Late frontal (desde ~550ms)=estrategias elaboradas multi-característica. La pregunta describe exactamente el Late frontal."},
{id:22,text:"El grado de profundidad a la que sometemos la información durante la fase de codificación/estudio en un experimento de memoria, se asocia con (estudio de Davachi et al., 2003)...",options:["Mayor actividad de hipocampo que predice mejor recuerdo del ítem y detalles contextuales.","Mayor actividad de corteza rinal que predice mejor recuerdo del ítem y detalles contextuales.","Mayor actividad de la corteza prefrontal inferior que predice mejor recuerdo del ítem y detalles contextuales."],correct:0,confidence:"Alto",explanation:"Hipocampo→recolección (ítem+contexto). Corteza rinal→familiaridad (ítem solo). Mayor profundidad activa más hipocampo y predice mejor recuerdo del ítem más contexto (Diapo 70)."},
{id:23,text:"En la amnesia producida por daño frontal existe:",options:["Déficit desproporcionado en recuerdo libre frente a reconocimiento.","Déficit desproporcionado en reconocimiento frente a recuerdo libre.","Recuerdo libre y reconocimiento están igualmente afectados."],correct:0,confidence:"Medio",explanation:"La CPF es necesaria para la recuperación estratégica activa (recuerdo libre). El reconocimiento depende de familiaridad (corteza perirrinal, intacta en daño frontal). Por eso el daño frontal afecta más al recuerdo libre."},
{id:24,text:"Normalmente, el síndrome amnésico exhibido por los pacientes de Korsakoff es debido al daño en:",options:["Hipocampo.","Prosencéfalo basal.","Tálamo anterior y cuerpos mamilares."],correct:2,confidence:"Bajo",explanation:"Seguridad baja (no aparece en apuntes/diapositivas). El síndrome de Korsakoff (déficit de tiamina, alcoholismo crónico) afecta clásicamente al tálamo anterior y cuerpos mamilares."}];
let order=[],current=0,answers={},isRandom=false,reviewMode=false;
function initOrder(){order=Q.map((_,i)=>i);if(isRandom)order=shuffle([...order]);}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getQ(p){return Q[order[p]];}
function totalQ(){return order.length;}
function render(){
  const q=getQ(current),answered=answers[current]!==undefined,uc=answers[current];
  const badge=q.confidence==='Alto'?'badge-high':q.confidence==='Medio'?'badge-med':'badge-low';
  document.getElementById('qMeta').innerHTML=`<span>Pregunta ${q.id}</span><span class="badge ${badge}">Seguridad: ${q.confidence}</span>${reviewMode?'<span class="badge badge-review">🔁 Repaso errores</span>':''}`;
  document.getElementById('qText').textContent=q.text;
  const L=['A','B','C','D'],cont=document.getElementById('optionsContainer');
  cont.innerHTML='';
  q.options.forEach((opt,i)=>{
    const d=document.createElement('div');d.className='option';
    if(answered)d.classList.add('locked');
    if(answered){if(i===q.correct)d.classList.add('correct-ans');else if(i===uc&&uc!==q.correct)d.classList.add('wrong-ans');}
    else if(uc===i)d.classList.add('selected');
    const ic=answered?(i===q.correct?'<span class="opt-icon">✅</span>':i===uc&&uc!==q.correct?'<span class="opt-icon">❌</span>':''):'';
    d.innerHTML=`<div class="opt-letter">${L[i]}</div><div style="flex:1">${opt}</div>${ic}`;
    if(!answered)d.addEventListener('click',()=>selOpt(i));
    cont.appendChild(d);
  });
  const fb=document.getElementById('feedback');fb.className='feedback';
  if(answered){
    fb.classList.add('show');const ok=uc===q.correct;fb.classList.add(ok?'correct':'incorrect');
    document.getElementById('feedbackHeader').textContent=ok?'✅ ¡Correcto!':`❌ Incorrecto — La respuesta correcta es: ${L[q.correct]}. ${q.options[q.correct]}`;
    document.getElementById('feedbackExp').textContent=q.explanation;
  }
  const pos=current+1,tot=totalQ();
  document.getElementById('progLabel').textContent=`Pregunta ${pos} de ${tot}`;
  const pct=Math.round(pos/tot*100);
  document.getElementById('progPct').textContent=pct+'%';
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('btnPrev').disabled=current===0;
  document.getElementById('btnCheck').disabled=answered||answers[current]===undefined;
  document.getElementById('btnNext').textContent=current===tot-1?'Finalizar':'Siguiente →';
  updStats();
}
function selOpt(i){if(answers[current]!==undefined)return;answers[current]=i;render();document.getElementById('btnCheck').disabled=false;}
function checkAns(){if(answers[current]===undefined)return;render();}
function goNext(){if(current===totalQ()-1){showFinal();return;}current++;render();}
function goPrev(){if(current>0){current--;render();}}
function calcStats(){let c=0,w=0;order.forEach((qi,p)=>{if(answers[p]!==undefined){if(answers[p]===Q[qi].correct)c++;else w++;}});return{correct:c,wrong:w,answered:c+w};}
function updStats(){
  const{correct,wrong,answered}=calcStats(),pct=answered>0?Math.round(correct/answered*100):0;
  document.getElementById('statTotal').textContent=`${answered} / ${totalQ()}`;
  document.getElementById('statCorrect').textContent='Correctas: '+correct;
  document.getElementById('statWrong').textContent='Incorrectas: '+wrong;
  document.getElementById('statPct').textContent=pct+'%';
  const hasErr=order.some((qi,p)=>answers[p]!==undefined&&answers[p]!==Q[qi].correct);
  document.getElementById('btnReview').disabled=!hasErr;
}
function showFinal(){
  document.getElementById('quizWrap').style.display='none';
  const fs=document.getElementById('finalScreen');fs.classList.add('show');
  const{correct,wrong}=calcStats(),tot=totalQ(),pct=Math.round(correct/tot*100);
  document.getElementById('finalScore').textContent=pct+'%';
  document.getElementById('fCorrect').textContent=correct;
  document.getElementById('fWrong').textContent=wrong;
  document.getElementById('fTotal').textContent=tot;
  document.getElementById('finalDetail').textContent=`${correct} de ${tot} preguntas correctas`;
  document.getElementById('finalEmoji').textContent=pct>=90?'🏆':pct>=70?'🎓':pct>=50?'📚':'💪';
  const hasErr=order.some((qi,p)=>answers[p]!==undefined&&answers[p]!==Q[qi].correct);
  document.getElementById('btnFinalReview').disabled=!hasErr;
}
function startReview(){
  const rl=order.reduce((acc,qi,p)=>{if(answers[p]!==undefined&&answers[p]!==Q[qi].correct)acc.push(qi);return acc;},[]);
  if(!rl.length)return;reviewMode=true;order=[...rl];answers={};current=0;
  document.getElementById('quizWrap').style.display='flex';
  document.getElementById('finalScreen').classList.remove('show');render();
}
function restart(){
  reviewMode=false;answers={};current=0;initOrder();
  document.getElementById('quizWrap').style.display='flex';
  document.getElementById('finalScreen').classList.remove('show');
  document.getElementById('btnReview').disabled=true;render();
}
document.getElementById('btnCheck').addEventListener('click',checkAns);
document.getElementById('btnNext').addEventListener('click',goNext);
document.getElementById('btnPrev').addEventListener('click',goPrev);
document.getElementById('btnRestart').addEventListener('click',restart);
document.getElementById('btnReview').addEventListener('click',startReview);
document.getElementById('btnFinalRestart').addEventListener('click',restart);
document.getElementById('btnFinalReview').addEventListener('click',startReview);
document.getElementById('toggleRandom').addEventListener('change',function(){isRandom=this.checked;restart();});
document.getElementById('optionsContainer').addEventListener('click',()=>{if(answers[current]===undefined){const s=document.querySelector('#optionsContainer .option.selected');document.getElementById('btnCheck').disabled=!s;}});
initOrder();render();
</script>
</body>
</html>
